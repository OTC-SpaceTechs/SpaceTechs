{% extends "base.html" %}

{% block title %}Delete {{ object }}{% endblock %}

{% block content %}
    <h1>Delete {{ object }}?</h1>
    <div class="panel">
        <div class="detail-grid__item">
            <p>Are you sure you want to delete <strong>{{ object }}</strong>? This can't be undone.</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn--danger">Delete</button>
                <a class="btn btn--ghost" href="{{ cancel_url }}">Cancel</a>
            </form>
        </div>
    </div>
{% endblock %}
