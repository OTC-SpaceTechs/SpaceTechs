{% extends "base.html" %}

{% block title %}Officer Login{% endblock %}

{% block content %}
    <h1>Officer Login</h1>
    <div class="panel">
        <div class="panel__header"><span>Authenticate</span></div>
        <div class="detail-grid__item">
            {% if form.errors %}
            <p style="color:#f5a3a3;">Your username and password didn't match. Please try again.</p>
            {% endif %}
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <p>
                    <label for="id_username">Username</label><br>
                    <input type="text" name="username" autofocus id="id_username" class="text-input">
                </p>
                <p>
                    <label for="id_password">Password</label><br>
                    <input type="password" name="password" id="id_password" class="text-input">
                </p>
                <input type="hidden" name="next" value="{{ next }}">
                <button type="submit" class="btn btn--primary">Log In</button>
            </form>
        </div>
    </div>
{% endblock %}
